name: secret-scan

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  secret-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Install secret scanning tools
        env:
          GOBIN: ${{ runner.temp }}/bin
        run: |
          set -euo pipefail
          mkdir -p "$GOBIN"
          echo "$GOBIN" >> "$GITHUB_PATH"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

          go install github.com/zricethezav/gitleaks/v8@v8.30.1

          trufflehog_version="3.95.2"
          trufflehog_archive="trufflehog_${trufflehog_version}_linux_amd64.tar.gz"
          trufflehog_sha256="fded1c139fe4d3872d9fde65e1428d82d5556d655439e82f492d87ae8d846779"
          curl -fsSLO "https://github.com/trufflesecurity/trufflehog/releases/download/v${trufflehog_version}/${trufflehog_archive}"
          printf '%s  %s\n' "$trufflehog_sha256" "$trufflehog_archive" | sha256sum -c -
          tar -xzf "$trufflehog_archive" -C "$GOBIN" trufflehog

          python3 -m pip install --user detect-secrets==1.5.0

      - name: Run secret scan
        run: ./scripts/secret-scan.sh
